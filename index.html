async function enterPool(){
  const nm=S.pname.trim();
  if(!nm){S.err='Enter your name';render();return}
  S.loading=true;render();
  // Check if already in the group
  const{data:ex}=await db.from('players').select('*').eq('group_id','lamivoie').ilike('name',nm);
  if(!ex||!ex.length){
    // Check if draft is locked before adding
    const{data:grp}=await db.from('groups').select('*').eq('id','lamivoie').single();
    if(grp&&grp.draft_locked){S.err='Draft is locked — ask Amédée to add you';S.loading=false;render();return}
    const{error:e2}=await db.from('players').insert({group_id:'lamivoie',name:nm});
    if(e2){S.err='Join failed: '+e2.message;S.loading=false;render();return}
  }
  S.loading=false;S.scr='lobby';S.err='';
  saveName();await loadGroup('lamivoie');render();
  toast('Welcome!',true);
}

async function loadGroup(gid){
  const{data:grp}=await db.from('groups').select('*').eq('id',gid).single();
  if(!grp)return;
  S.grp=grp;
  const{data:pl}=await db.from('players').select('*').eq('group_id',gid).order('joined_at');
  S.players=pl||[];
  const{data:sc}=await db.from('golfer_scores').select('*').eq('group_id',gid);
  S.gscores={};S.cuts=[];
  (sc||[]).forEach(r=>{S.gscores[r.golfer_name]=r.score;if(r.is_cut)S.cuts.push(r.golfer_name)});
  const{data:sr}=await db.from('side_bet_results').select('*').eq('group_id',gid);
  S.sbresults={};
  (sr||[]).forEach(r=>{if(r.result)S.sbresults[r.bet_id]=r.result});
  render();
}

async function submitPicks(){
  const err=validate(S.picks);
  if(err){S.err=err;render();return}
  const me=getMe();if(!me)return;
  const{error:e}=await db.from('players').update({picks:S.picks,side_bets:S.sbets}).eq('id',me.id);
  if(e){toast('Save failed',false);return}
  S.scr='lobby';S.err='';await loadGroup(S.gid);render();
  toast('Picks submitted!',true);
}

async function lockDraft(){
  await db.from('groups').update({draft_locked:true}).eq('id',S.gid);
  await loadGroup(S.gid);render();
  toast('Draft locked!',true);
}

async function toggleSwap(){
  const nv=!S.grp.swap_window_open;
  await db.from('groups').update({swap_window_open:nv}).eq('id',S.gid);
  await loadGroup(S.gid);render();
  toast(nv?'Swap window opened':'Swap window closed',true);
}

async function doSwap(oldN,newN){
  const me=getMe();
  if(!me||me.swap_used){S.err='Swap already used';render();return}
  const np=me.picks.map(n=>n===oldN?newN:n);
  await db.from('players').update({picks:np,swap_used:true}).eq('id',me.id);
  S.swapFrom=null;S.scr='lobby';await loadGroup(S.gid);render();
  toast('Swap done!',true);
}

async function saveScores(){
  const gid=S.gid;
  const allG=[...new Set(S.players.flatMap(p=>p.picks||[]))];
  // Batch upserts
  const rows=allG.map(n=>({group_id:gid,golfer_name:n,score:S.gscores[n]||0,is_cut:S.cuts.includes(n)}));
  if(rows.length){
    const{error:e}=await db.from('golfer_scores').upsert(rows,{onConflict:'group_id,golfer_name'});
    if(e){toast('Score save failed: '+e.message,false);return}
  }
  const sbRows=Object.entries(S.sbresults).filter(([,v])=>v).map(([k,v])=>({group_id:gid,bet_id:k,result:v}));
  if(sbRows.length){
    await db.from('side_bet_results').upsert(sbRows,{onConflict:'group_id,bet_id'});
  }
  S.scr='lobby';await loadGroup(gid);render();
  toast('Scores saved!',true);
}

// Fetch live scores from our API proxy
async function fetchLiveScores(){
  toast('Fetching live scores...',true);
  try{
    const r=await fetch('/api/scores');
    if(!r.ok){toast('Scores API error',false);return}
    const d=await r.json();
    if(!d.success||!d.scores?.length){toast(d.error||'No scores yet — tournament may not have started',false);return}
    // Cache full board for live view
    S.liveBoard=d.scores;S.liveBoardAt=new Date();
    // Match ESPN/masters.com names to our drafted golfers
    const drafted=[...new Set(S.players.flatMap(p=>p.picks||[]))];
    const matched=[];const unmatched=[];
    for(const ds of d.scores){
      let myName=drafted.find(n=>n.toLowerCase()===ds.name.toLowerCase());
      if(!myName){
        const last=ds.name.split(' ').pop().toLowerCase();
        myName=drafted.find(n=>n.split(' ').pop().toLowerCase()===last);
      }
      if(myName){
        matched.push({golfer_name:myName,score:ds.score,is_cut:ds.is_cut});
      }else{
        unmatched.push(ds.name);
      }
    }
    if(matched.length===0){toast('No matching golfers found',false);return}
    const rows=matched.map(m=>({group_id:'lamivoie',golfer_name:m.golfer_name,score:m.is_cut?10:m.score,is_cut:m.is_cut}));
    const{error:e}=await db.from('golfer_scores').upsert(rows,{onConflict:'group_id,golfer_name'});
    if(e){toast('DB update failed: '+e.message,false);return}
    await loadGroup('lamivoie');render();
    toast(`${matched.length} scores updated from ${d.source}`,true);
  }catch(e){toast('Fetch failed: '+e.message,false)}
}

          myName=drafted.find(n=>n.split(' ').pop().toLowerCase()===last);
        }
        if(myName)matched.push({group_id:'lamivoie',golfer_name:myName,score:ds.is_cut?10:ds.score,is_cut:ds.is_cut});
      }
      if(matched.length){
        await db.from('golfer_scores').upsert(matched,{onConflict:'group_id,golfer_name'});
        await loadGroup('lamivoie');
      }
    }else if(!silent){
      toast(d.error||'No scores yet',false);
    }
  }catch(e){if(!silent)toast('Fetch failed',false)}
  S.liveLoading=false;render();
}

// =============================================
// LOGIC
// =============================================
function getMe(){return S.players.find(p=>p.name.toLowerCase()===S.pname.trim().toLowerCase())}
function isComm(){return S.grp?.commissioner?.toLowerCase()===S.pname.trim().toLowerCase()}

function validate(picks){
  if(picks.length!==PK)return`Pick exactly ${PK} golfers`;
  const us=picks.filter(n=>gf(n)?.c==='US').length;
  if(us<2)return'Need at least 2 Americans 🇺🇸';
  if(picks.length-us<1)return'Need at least 1 international 🌍';
  if(!picks.some(n=>gf(n)?.k))return'Need at least 1 rookie 🌟';
  for(const[t,mx]of Object.entries(TM)){
    if(picks.filter(n=>gf(n)?.t===parseInt(t)).length>mx)return`Max ${mx} from ${TL[t]}`;
  }
  return null;
}

function togglePick(name){
  if(S.picks.includes(name)){S.picks=S.picks.filter(n=>n!==name);S.err='';render();return}
  if(S.picks.length>=PK){S.err=`Max ${PK} picks`;render();return}
  const gl=gf(name);
  const tc=S.picks.filter(n=>gf(n)?.t===gl.t).length;
  if(tc>=TM[gl.t]){S.err=`Max ${TM[gl.t]} from ${TL[gl.t]}`;render();return}
  S.picks.push(name);S.err='';render();
}

function calcBonus(p){
  const sb2=p.side_bets||{};
  let b=0;
  for(const bet of SB){
    const res=S.sbresults[bet.id];
    if(!res||!sb2[bet.id])continue;
    if(bet.tp==='yesno')b+=sb2[bet.id]===res?bet.bn:bet.pn;
    else b+=sb2[bet.id].toLowerCase()===res.toLowerCase()?bet.bn:bet.pn;
  }
  return b;
}

function getBoard(){
  return S.players.map(p=>{
    const ps=(p.picks||[]).map(n=>{
      const ic=S.cuts.includes(n);
      return{n,sc:ic?10:(S.gscores[n]||0),cut:ic};
    });
    const b4=[...ps].sort((a,b)=>a.sc-b.sc).slice(0,4);
    const b4t=b4.reduce((a,b)=>a+b.sc,0);
    const sb2=calcBonus(p);
    return{...p,ps,b4t,sb2,fin:b4t+sb2};
  }).sort((a,b)=>a.fin-b.fin);
}

function startPoll(){
  clearInterval(_rt);
  _rt=setInterval(()=>{
    if(!S.gid)return;
    if(S.scr==='lobby'||S.scr==='leaderboard')loadGroup(S.gid);
    if(S.scr==='masters')fetchMastersBoard(true);
  },S.scr==='masters'?60000:8000);
}
function stopPoll(){clearInterval(_rt)}

    if(!S.liveBoard&&!S.liveLoading){fetchMastersBoard(true)}
    startPoll();

    // Build pick-owner map: golfer name -> player names who picked them
    const pickMap={};
    S.players.forEach(p=>(p.picks||[]).forEach(g=>{
      if(!pickMap[g])pickMap[g]=[];
      pickMap[g].push(p.name);
    }));

    h+=`<div class="col gap10 fu">
      <div class="row" style="justify-content:space-between;align-items:center">
        <button class="bt bo bs" onclick="stopPoll();S.scr='lobby';render()">← Back</button>
        <h3 class="pf" style="font-size:17px">Live Leaderboard</h3>
        <button class="bt bo bs" onclick="fetchMastersBoard(false)" ${S.liveLoading?'disabled':''}>${S.liveLoading?'…':'↻'}</button>
      </div>`;

    if(S.liveBoardAt){
      const ago=Math.round((Date.now()-S.liveBoardAt.getTime())/1000);
      h+=`<div class="fs11 muted2 tac">Updated ${ago<60?ago+'s':Math.round(ago/60)+'m'} ago · auto-refreshes every 60s</div>`;
    }

    if(!S.liveBoard||S.liveBoard.length===0){
      if(S.liveLoading){
        h+=`<div class="cd tac muted fs13" style="padding:30px">Loading live scores...</div>`;
      }else{
        h+=`<div class="cd tac muted fs13" style="padding:20px">No live scores available yet.<br><span class="fs11 muted2">First tee shot Thursday ~8am ET</span></div>`;
      }
    }else{
      // Sort by score (lower = better), then by status
      const sorted=[...S.liveBoard].sort((a,b)=>{
        if(a.is_cut&&!b.is_cut)return 1;
        if(!a.is_cut&&b.is_cut)return -1;
        return (a.score||0)-(b.score||0);
      });

      h+=`<div class="cd" style="overflow:hidden">
        <div style="display:grid;grid-template-columns:36px 1fr 50px 50px;align-items:center;padding:10px 14px;font-size:10px;font-weight:600;color:rgba(232,224,208,.35);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid rgba(255,255,255,.08)">
          <div>POS</div><div>Player</div><div class="tar">Thru</div><div class="tar">Score</div>
        </div>
        <div style="max-height:65vh;overflow-y:auto">`;

      let displayPos=0;let lastScore=null;let actualPos=0;
      sorted.forEach((p,i)=>{
        actualPos++;
        if(p.score!==lastScore||p.is_cut){displayPos=actualPos;lastScore=p.score}
        const owners=pickMap[p.name]||[];
        // Try matching by last name if not exact
        if(owners.length===0){
          const last=p.name.split(' ').pop().toLowerCase();
          for(const draftedName in pickMap){
            if(draftedName.split(' ').pop().toLowerCase()===last){
              owners.push(...pickMap[draftedName]);
              break;
            }
          }
        }
        const isMine=owners.includes(S.pname.trim());
        const isDrafted=owners.length>0;
        const scoreColor=p.is_cut?'rgba(232,224,208,.35)':p.score<0?'#8B9F6B':p.score>0?'#e07070':'#e8e0d0';
        const rowBg=isMine?'rgba(201,168,76,.08)':isDrafted?'rgba(139,159,107,.05)':'transparent';
        const borderL=isMine?'3px solid #C9A84C':isDrafted?'3px solid #8B9F6B':'3px solid transparent';

        h+=`<div style="display:grid;grid-template-columns:36px 1fr 50px 50px;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);background:${rowBg};border-left:${borderL}">
          <div class="fs12 fw6 ${p.is_cut?'muted2':''}">${p.is_cut?'CUT':(p.pos||displayPos)}</div>
          <div style="min-width:0">
            <div class="fs13 fw6" style="${p.is_cut?'opacity:.5':''}">${esc(p.name)}</div>
            ${owners.length>0?`<div class="fs10" style="color:${isMine?'#C9A84C':'#8B9F6B'};margin-top:1px">${owners.map(o=>esc(o)).join(', ')}</div>`:''}
          </div>
          <div class="tar fs11 muted2">${p.is_cut?'—':esc(p.thru||'')}</div>
          <div class="tar fw6 fs14" style="color:${scoreColor}">${p.is_cut?'+10':fm(p.score||0)}</div>
        </div>`;
      });
      h+=`</div></div>`;

      // Legend
      h+=`<div class="cd row" style="padding:10px 14px;gap:14px;flex-wrap:wrap;font-size:11px">
        <div class="row" style="align-items:center;gap:5px"><span style="width:10px;height:10px;background:#C9A84C;border-radius:2px"></span><span class="muted">Your picks</span></div>
        <div class="row" style="align-items:center;gap:5px"><span style="width:10px;height:10px;background:#8B9F6B;border-radius:2px"></span><span class="muted">Pool picks</span></div>
        <div class="muted2" style="margin-left:auto">${sorted.filter(p=>!p.is_cut).length} active · ${sorted.filter(p=>p.is_cut).length} cut</div>
      </div>`;
    }
    h+=`</div>`;
  }

  // ========== SCORES (Commissioner) ==========
  else if(S.scr==='scores'&&S.grp){
    const allG=[...new Set(S.players.flatMap(p=>p.picks||[]))].sort();
    h+=`<div class="col gap10 fu">
      <div class="row" style="justify-content:space-between;align-items:center">
        <button class="bt bo bs" onclick="S.scr='lobby';render()">← Back</button>
        <h3 class="pf" style="font-size:16px">Commissioner Panel</h3>
        <div></div>
      </div>
      <div class="cd" style="padding:14px">
        <h4 class="fs13 fw6 muted" style="margin-bottom:6px">Golfer Scores (vs par)</h4>
        <div class="fs11 muted2" style="margin-bottom:8px">Enter total vs par. Tick MC for missed cut.</div>
        <div style="max-height:320px;overflow-y:auto">`;
    allG.forEach(name=>{
      h+=`<div class="row" style="justify-content:space-between;align-items:center;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.03)">
        <div style="flex:1"><span class="fs13">${esc(name)}</span>${S.cuts.includes(name)?'<span class="fs10 red" style="margin-left:6px">MC</span>':''}</div>
        <div class="row" style="align-items:center;gap:6px">
          <input type="number" value="${S.gscores[name]||0}" onchange="S.gscores['${q(name)}']=parseInt(this.value)||0" style="width:56px;padding:5px 6px;text-align:center;font-size:13px">
          <label class="fs10 muted row" style="align-items:center;gap:3px;cursor:pointer">
            <input type="checkbox" ${S.cuts.includes(name)?'checked':''} onchange="if(this.checked){if(!S.cuts.includes('${q(name)}'))S.cuts.push('${q(name)}')}else{S.cuts=S.cuts.filter(n=>n!=='${q(name)}')}">MC</label>
        </div></div>`;
    });
    h+=`</div></div>
      <div class="cd" style="padding:14px">
        <h4 class="fs13 fw6 muted" style="margin-bottom:8px">Side Bet Results</h4>`;
    SB.forEach(bet=>{
      h+=`<div style="margin-bottom:10px"><div class="fs12 fw6" style="margin-bottom:4px">${bet.lb}</div>`;
      if(bet.tp==='yesno'){
        h+=`<div class="row gap6">`;
        ['yes','no',''].forEach(v=>{
          h+=`<button class="tb ${(S.sbresults[bet.id]||'')===(v)?'a':''}" onclick="S.sbresults['${bet.id}']='${v}';render()" style="font-size:11px">${v||'Clear'}</button>`;
        });
        h+=`</div>`;
      }else{
        h+=`<input type="text" value="${esc(S.sbresults[bet.id]||'')}" onchange="S.sbresults['${bet.id}']=this.value" placeholder="Golfer name (exact match)" style="font-size:12px;padding:7px 10px">`;
      }
      h+=`</div>`;
    });
    h+=`</div><button class="bt bg w100" onclick="saveScores()">Save All</button></div>`;
  }

  h+=`</div>`; // .wrap
  $.innerHTML=h;
}

// Init — auto-enter if name is saved
if(S.pname){enterPool()}else{render()}
</script>
</body>
</html>
